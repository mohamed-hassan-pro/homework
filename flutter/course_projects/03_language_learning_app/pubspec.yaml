name: language_learning_app
description: "A language learning app (Toku style) with restored assets."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  device_preview: ^1.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/utils/images/colors/
    - assets/utils/images/family_members/
    - assets/utils/images/numbers/
    - assets/utils/sounds/colors/
    - assets/utils/sounds/family_members/
    - assets/utils/sounds/numbers/
    - assets/utils/sounds/phrases/

